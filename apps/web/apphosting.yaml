# Firebase App Hosting config for the MailPoppy web app + Hub.
# Build this backend from the monorepo `leonct74/mailpoppy` with ROOT DIRECTORY = apps/web.
# Declaring env here means a new backend auto-configures from code — no clicking each var in
# the console.
#
# SECRETS (Stripe) are referenced by NAME from Google Secret Manager — the values never live in
# this file or in git. If those secrets don't exist yet on this project, create them once:
#   firebase apphosting:secrets:set STRIPE_SECRET_KEY
#   firebase apphosting:secrets:set STRIPE_WEBHOOK_SECRET
# and grant this backend access when prompted (firebase apphosting:secrets:grantaccess …).
#
# The NEXT_PUBLIC_FIREBASE_* values are PUBLIC client identifiers (not secrets) and MUST be
# available at BUILD time so Next.js inlines them into the browser bundle. Fill the REPLACE_ME
# placeholders below with the values from the `mailpoppy-web` Firebase web app (Project settings
# → Your apps → Config). STRIPE_PRICE_ID is a non-secret price_… id — fill it too.

runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # --- Stripe (server-side; secret values stay in Secret Manager) -----------------------------
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_ID
    value: REPLACE_ME_price_id # e.g. price_1Qabc… (not secret)
    availability:
      - RUNTIME

  # --- Firebase web config (PUBLIC; must be present at BUILD time) -----------------------------
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: REPLACE_ME_firebase_apiKey
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: REPLACE_ME_firebase_authDomain
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: REPLACE_ME_firebase_projectId
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: REPLACE_ME_firebase_appId
    availability:
      - BUILD
      - RUNTIME
